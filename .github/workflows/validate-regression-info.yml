name: Validate regression info.yml

on: [push, pull_request, workflow_dispatch]

jobs:
  validate-regression-info:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml

    - name: Validate regression info.yml files
      run: |
        python tests/validate-regression-info/validate.py